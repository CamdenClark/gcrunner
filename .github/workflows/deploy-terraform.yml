name: Deploy Terraform (Main)

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - "orchestrator/**"
      - ".github/workflows/deploy-terraform.yml"

jobs:
  publish-orchestrator:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./orchestrator
          push: true
          tags: |
            ghcr.io/camdenclark/gcrunner:latest
            ghcr.io/camdenclark/gcrunner:${{ github.sha }}

  deploy:
    needs: publish-orchestrator
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_DEPLOY }}

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="prefix=gcrunner-main"

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="project_id=${{ vars.TF_PROJECT_ID }}" \
            -var="gcrunner_version=${{ github.sha }}" \
            -out=tfplan

      - name: Terraform Apply
        run: terraform apply tfplan

  smoke-test-n2d-go:
    needs: deploy
    runs-on: gcrunner=${{ github.run_id }}-n2d/machine=n2d-standard-2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Build orchestrator
        run: cd orchestrator && go build ./...
      - name: Test orchestrator
        run: cd orchestrator && go test ./...

  smoke-test-e2-node:
    needs: deploy
    runs-on: gcrunner=${{ github.run_id }}-e2/machine=e2-medium
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Node smoke test
        run: node -e "console.log('Node', process.version, 'on', process.arch, process.platform)"
      - name: System info
        run: |
          echo "CPUs: $(nproc)"
          echo "Memory: $(free -h | awk '/Mem:/{print $2}')"
          df -h /

  smoke-test-c3-go:
    needs: deploy
    runs-on: gcrunner=${{ github.run_id }}-c3/family=c3/cpu=4
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Build cache-server
        run: cd cache-server && go build ./...
      - name: Test cache-server
        run: cd cache-server && go test ./...
