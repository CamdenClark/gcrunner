name: Deploy Terraform (Main)

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - "orchestrator/**"
      - ".github/workflows/deploy-terraform.yml"

jobs:
  publish-orchestrator:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./orchestrator
          push: true
          tags: |
            ghcr.io/camdenclark/gcrunner:latest
            ghcr.io/camdenclark/gcrunner:${{ github.sha }}

  deploy:
    needs: publish-orchestrator
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_DEPLOY }}

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="prefix=gcrunner-main"

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="project_id=${{ vars.TF_PROJECT_ID }}" \
            -var="gcrunner_version=${{ github.sha }}" \
            -out=tfplan

      - name: Terraform Apply
        run: terraform apply tfplan
