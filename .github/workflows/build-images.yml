name: Build GCE Runner Images

on:
  schedule:
    - cron: '0 6 * * 1'  # Monday 6am UTC
  workflow_dispatch:
    inputs:
      family:
        description: 'Image family to build (or "all")'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - ubuntu2404-x64
          - ubuntu2204-x64

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        family:
          - ubuntu2404-x64
          - ubuntu2204-x64
        exclude:
          - family: ${{ github.event.inputs.family != 'all' && github.event.inputs.family != 'ubuntu2404-x64' && 'ubuntu2404-x64' || '' }}
          - family: ${{ github.event.inputs.family != 'all' && github.event.inputs.family != 'ubuntu2204-x64' && 'ubuntu2204-x64' || '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Install Packer
        run: |
          curl -fsSL https://apt.releases.hashicorp.com/gpg | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | \
            sudo tee /etc/apt/sources.list.d/hashicorp.list
          sudo apt-get update && sudo apt-get install -y packer

      - name: Init Packer
        working-directory: images
        run: packer init packer.pkr.hcl

      - name: Validate Packer
        working-directory: images
        run: packer validate -var-file="${{ matrix.family }}.pkrvars.hcl" -var "project_id=${{ vars.PACKER_PROJECT_ID }}" packer.pkr.hcl

      - name: Build Image
        working-directory: images
        run: packer build -var-file="${{ matrix.family }}.pkrvars.hcl" -var "project_id=${{ vars.PACKER_PROJECT_ID }}" packer.pkr.hcl

      - name: Make image public
        run: |
          LATEST_IMAGE=$(gcloud compute images list \
            --project="${{ vars.PACKER_PROJECT_ID }}" \
            --filter="family=gcrunner-${{ matrix.family }}" \
            --sort-by="~creationTimestamp" \
            --limit=1 \
            --format="value(name)")
          gcloud compute images add-iam-policy-binding "${LATEST_IMAGE}" \
            --project="${{ vars.PACKER_PROJECT_ID }}" \
            --member="allUsers" \
            --role="roles/compute.imageUser"

      - name: Smoke test
        run: |
          LATEST_IMAGE=$(gcloud compute images list \
            --project="${{ vars.PACKER_PROJECT_ID }}" \
            --filter="family=gcrunner-${{ matrix.family }}" \
            --sort-by="~creationTimestamp" \
            --limit=1 \
            --format="value(name)")
          ZONE="us-central1-a"
          VM_NAME="smoke-test-${{ matrix.family }}-${{ github.run_id }}"

          gcloud compute instances create "${VM_NAME}" \
            --project="${{ vars.PACKER_PROJECT_ID }}" \
            --zone="${ZONE}" \
            --machine-type=e2-small \
            --image="${LATEST_IMAGE}" \
            --image-project="${{ vars.PACKER_PROJECT_ID }}"

          # Wait for VM to boot
          sleep 30

          # Verify runner agent and key tools
          gcloud compute ssh "${VM_NAME}" --zone="${ZONE}" --project="${{ vars.PACKER_PROJECT_ID }}" --command="
            test -f /home/runner/run.sh && echo 'PASS: run.sh'
            test -d /opt/hostedtoolcache && echo 'PASS: hostedtoolcache'
            docker --version && echo 'PASS: docker'
            gcloud --version | head -1 && echo 'PASS: gcloud'
          "

          # Cleanup
          gcloud compute instances delete "${VM_NAME}" --zone="${ZONE}" --project="${{ vars.PACKER_PROJECT_ID }}" --quiet
